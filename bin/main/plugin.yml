name: ${project.artifactId}
version: ${project.version}
main: ${project.groupId}.${project.artifactId}
author: LazyGon
api-version: 1.14
description: Plugin that implements suffix command.

commands:
  suffix:
    description: "Command that changes suffix of player."
    permission: "suffix.use"

permissions:
  suffix.use:
    default: op
  suffix.other:
    default: op
  suffix.unlimited.length:
    default: op
  suffix.unlimited.pattern:
    default: op